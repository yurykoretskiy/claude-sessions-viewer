<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POC v2 — Conversation Viewer (exact render)</title>
<style>
  body[data-theme="dark"] {
    --bg:#1e1e1e; --panel:#252526; --line:#3c3c3c; --fg:#cccccc; --mut:#8a8a8a;
    --user-bub:#3a2620; --user-line:#d97757; --ai-bub:#2a2d2e; --chip:#333;
    --btn:#0e639c; --btn-fg:#fff; --btn2:#3a3d41; --accent:#d97757; --sep:#5a5a5a;
  }
  body[data-theme="light"] {
    --bg:#ffffff; --panel:#f3f3f3; --line:#e0e0e0; --fg:#333333; --mut:#767676;
    --user-bub:#fbeee8; --user-line:#d97757; --ai-bub:#f4f4f4; --chip:#ececec;
    --btn:#007acc; --btn-fg:#fff; --btn2:#e4e4e4; --accent:#c15f3c; --sep:#bbb;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:#0b0b0b; font:13px/1.55 -apple-system,"SF Pro Text","Segoe UI",sans-serif;
         display:flex; flex-direction:column; align-items:center; padding:20px; gap:14px; }

  .demo-bar { display:flex; gap:8px; align-items:center; color:#999; font-size:12px; flex-wrap:wrap; }
  .demo-bar b { color:#ddd; }
  .demo-bar button { background:#2b2b2b; color:#ddd; border:1px solid #444; border-radius:12px;
                     padding:3px 12px; cursor:pointer; font-size:12px; }
  .demo-bar button.on { background:#d97757; color:#fff; border-color:#d97757; }

  .vscode-frame { width:min(860px,96vw); border-radius:8px; overflow:hidden;
                  box-shadow:0 12px 40px rgba(0,0,0,.5); }
  .vstab { background:var(--panel); color:var(--mut); font-size:12px; padding:7px 14px;
           border-bottom:1px solid var(--line); display:flex; gap:8px; align-items:center; }
  .vstab .dot { color:var(--accent); }
  .viewer { background:var(--bg); color:var(--fg); height:74vh; display:flex; flex-direction:column; position:relative; }

  /* ── compact header: one slim row ── */
  .vhead { padding:7px 12px; border-bottom:1px solid var(--line); background:var(--panel); }
  .vrow { display:flex; align-items:center; gap:8px; }
  .vrow .spark { color:var(--accent); }
  .vrow .title { font-size:13px; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ibtn { border:none; background:transparent; color:var(--mut); font-size:14px; cursor:pointer;
          padding:2px 6px; border-radius:4px; }
  .ibtn:hover { background:var(--btn2); color:var(--fg); }
  .ibtn.play { color:var(--accent); }
  .details { display:none; color:var(--mut); font-size:11.5px; margin-top:5px; }
  .details.open { display:block; }
  .details code { background:var(--chip); border-radius:3px; padding:0 4px; font-size:11px; }

  /* ── filter bar ── */
  .fbar { display:flex; gap:6px; align-items:center; padding:5px 12px; border-bottom:1px solid var(--line);
          background:var(--bg); font-size:11.5px; }
  .fchip { border:1px solid var(--line); background:transparent; color:var(--mut); border-radius:11px;
           padding:1px 11px; cursor:pointer; font-size:11.5px; }
  .fchip.on { background:var(--chip); color:var(--fg); border-color:var(--sep); }
  .fchip.user.on { border-color:var(--user-line); color:var(--accent); }
  .fbar .right { margin-left:auto; display:flex; gap:10px; align-items:center; color:var(--mut); }
  .fbar label { cursor:pointer; user-select:none; }

  .chat { flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:9px; }
  .banner { align-self:stretch; text-align:center; background:var(--chip); color:var(--mut);
            border-radius:6px; padding:5px 10px; font-size:11.5px; }
  .banner b { color:var(--fg); cursor:pointer; text-decoration:underline; }
  .day { align-self:center; color:var(--mut); font-size:11px; letter-spacing:.06em;
         border-bottom:1px solid var(--line); padding:0 10px 2px; }
  .msg { max-width:76%; padding:7px 11px; border-radius:10px; white-space:pre-wrap; }
  .msg .who { font-size:10.5px; color:var(--mut); margin-bottom:2px; letter-spacing:.04em; }
  .msg.user { align-self:flex-end; background:var(--user-bub); border-right:3px solid var(--user-line);
              border-bottom-right-radius:3px; }
  .msg.ai { align-self:flex-start; background:var(--ai-bub); border-bottom-left-radius:3px; }
  .msg.ai .who::before { content:"✳ "; color:var(--accent); }
  .msg .more { color:var(--accent); font-size:11.5px; cursor:pointer; margin-top:4px; display:inline-block; }
  .tool { align-self:center; font:11px ui-monospace,Menlo,monospace; color:var(--mut);
          background:var(--chip); border-radius:10px; padding:1px 10px; }
  .jump { position:absolute; right:18px; bottom:16px; background:var(--btn2); color:var(--fg);
          border:1px solid var(--line); border-radius:50%; width:30px; height:30px; cursor:pointer;
          display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.3); }
  .empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
           color:var(--mut); gap:6px; }
  .empty .spark { font-size:28px; color:var(--accent); opacity:.6; }
  .toast { position:absolute; left:50%; transform:translateX(-50%); bottom:60px; background:var(--accent);
           color:#fff; border-radius:6px; padding:5px 14px; font-size:12px; display:none; }
</style>
</head>
<body data-theme="dark">

<div class="demo-bar">
  <b>Condition:</b>
  <button class="on" data-state="normal">Normal</button>
  <button data-state="huge">Huge (1,412 msgs)</button>
  <button data-state="untitled">Untitled</button>
  <button data-state="empty">Empty</button>
  <span style="opacity:.4">|</span>
  <b>Theme:</b>
  <button data-theme-btn="dark" class="on">Dark</button>
  <button data-theme-btn="light">Light</button>
  <span style="opacity:.5">— everything inside the frame is the real design; try the filters, ⌄ header fold, tools toggle</span>
</div>

<div class="vscode-frame">
  <div class="vstab"><span class="dot">✳</span><span id="tabname"></span></div>
  <div class="viewer">
    <div class="vhead">
      <div class="vrow">
        <span class="spark">✳</span><span class="title" id="vtitle"></span>
        <button class="ibtn play" title="Resume in terminal — the ONLY thing that runs anything">▶</button>
        <button class="ibtn" title="Copy entire conversation (all messages, current filter) as markdown — works even when not all messages are rendered" onclick="toast('Entire conversation copied — 1,412 messages')">⧉</button>
        <button class="ibtn" title="Save conversation as .md file (same content as copy — for Obsidian vault)">⬇</button>
        <button class="ibtn" title="Reveal raw transcript .jsonl in Finder / open in editor">{ }</button>
        <button class="ibtn" id="fold" title="Session details">⌄</button>
      </div>
      <div class="details" id="details"></div>
    </div>
    <div class="fbar">
      <button class="fchip on" data-f="all">All</button>
      <button class="fchip user" data-f="user">YURY only</button>
      <button class="fchip" data-f="ai">CLAUDE only</button>
      <span class="right"><label><input type="checkbox" id="tools"> show tool markers</label></span>
    </div>
    <div class="chat" id="chat"></div>
    <div class="jump" title="Jump to last message" onclick="jumpEnd()">↓</div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
const STATES = {
  normal: {
    tab:"Conversation — Add Claude session launcher…",
    title:"Add Claude session launcher to VS Code folder context menu",
    details:`📁 claude-sessions-viewer · session <code>2e0cc0a3</code> · 05–06 Jul 2026 · 38 messages · started in ~/yury-vibe-coding · transcript 912 KB`,
    items:[
      {t:"day", v:"05 JUL 2026"},
      {t:"user", v:"can u modify VS Code that when I click on a specific folder I can run a claude session attached to this folder? now I need to open a new window every time and choose the folder"},
      {t:"ai", v:"Good news: this is doable without opening new windows. Two realistic ways to get \"right-click folder → Claude session in that folder\" inside your current window — both launch a terminal-based claude session cwd'd to the folder."},
      {t:"tool", v:"[tool: AskUserQuestion]"},
      {t:"user", v:"I need something similar to what I have on Codex. On the left I have all my projects that I work on. Inside them I have all my sessions and I can go over sessions easily."},
      {t:"tool", v:"[tool: Bash] ×4 · [tool: Write] ×6"},
      {t:"ai", v:"Data model confirmed: each session .jsonl carries an aiTitle, per-message cwd (ground truth for where it started), timestamps, and tool-call file paths I can use to attribute misfiled root sessions to the folder they actually worked in.", more:true},
      {t:"day", v:"06 JUL 2026"},
      {t:"user", v:"Ok, I want you to finish this, commit, and I want you to graduate this project…"},
      {t:"ai", v:"Everything is done. Reload the window once to get v1.1.1. Duplicates — real bug, fixed: when you resume a session from a different folder, Claude copies the transcript into that folder's project dir."}
    ]
  },
  huge: {
    tab:"Conversation — Review Reddit dataset…",
    title:"Review Reddit dataset files for parsing benchmark",
    details:`📁 reddit-parse-benchmark · session <code>ad6c06bf</code> · 12 Jun – 03 Jul 2026 · 1,412 messages · transcript 30 MB`,
    banner:`big session — 200 latest rendered for speed · <b onclick="toast('All 1,412 messages rendered — ⌘A now selects everything')">render all 1,412</b> (⌘A then selects all) · ⧉ always copies all`,
    items:[
      {t:"day", v:"03 JUL 2026"},
      {t:"user", v:"run the benchmark again with the new parser and compare against v2 results"},
      {t:"tool", v:"[tool: Bash] ×14 · [tool: Read] ×3"},
      {t:"ai", v:"Benchmark complete. The v3 parser processes 1,066 threads in 42 s (v2: 61 s) with identical output on 1,064 threads; the 2 diffs are malformed unicode in source data, not parser regressions.", more:true},
      {t:"user", v:"good, store it as a finding"},
      {t:"tool", v:"[tool: Bash]"},
      {t:"ai", v:"Stored as FINDING-014 linked to INPUT-003. Benchmark data saved to data/parser-v3-benchmark-03-07-2026.json."}
    ]
  },
  untitled: {
    tab:"Conversation — 869cc5b6",
    title:"Untitled session 869cc5b6",
    details:`📁 ~/yury-vibe-coding (root) · session <code>869cc5b6</code> · 20 Jun 2026 · 3 messages`,
    items:[
      {t:"day", v:"20 JUN 2026"},
      {t:"user", v:"hi"},
      {t:"ai", v:"Hi! I'm ready to help. What are we working on today?"},
      {t:"user", v:"nothing, just checking the new setup works"}
    ]
  },
  empty: { tab:"Conversation — b194dd8c", title:"Session b194dd8c",
    details:`📁 ~/yury-vibe-coding (root) · session <code>b194dd8c</code> · 19 Jun 2026 · 0 readable messages`,
    items:[], empty:true }
};

let cur = "normal", filter = "all";
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.style.display="block";
                   setTimeout(()=>t.style.display="none", 2200); }
function jumpEnd(){ const c=document.getElementById("chat"); c.scrollTop=c.scrollHeight; }

function render(){
  const st = STATES[cur];
  const showTools = document.getElementById("tools").checked;
  document.getElementById("tabname").textContent = st.tab;
  document.getElementById("vtitle").textContent = st.title;
  document.getElementById("details").innerHTML = st.details;
  const chat = document.getElementById("chat");
  chat.innerHTML = "";
  if (st.empty) {
    chat.innerHTML = `<div class="empty"><div class="spark">✳</div>` +
      `<div>No readable conversation in this transcript</div>` +
      `<div style="font-size:11.5px">(only tool traffic / system records — { } opens the raw file)</div></div>`;
    return;
  }
  if (st.banner) chat.insertAdjacentHTML("beforeend", `<div class="banner">${st.banner}</div>`);
  for (const it of st.items) {
    if (it.t === "day") { if (filter === "all") chat.insertAdjacentHTML("beforeend", `<div class="day">${it.v}</div>`); continue; }
    if (it.t === "tool") { if (showTools && filter === "all") chat.insertAdjacentHTML("beforeend", `<div class="tool">${esc(it.v)}</div>`); continue; }
    if (filter !== "all" && it.t !== filter) continue;
    const who = it.t === "user" ? "YURY" : "CLAUDE";
    const more = it.more ? `<span class="more">show full message ▾</span>` : "";
    chat.insertAdjacentHTML("beforeend",
      `<div class="msg ${it.t}"><div class="who">${who}</div>${esc(it.v)}${more}</div>`);
  }
  jumpEnd(); // WhatsApp behavior: always open at the last message
}

document.querySelectorAll("[data-state]").forEach(b => b.onclick = () => {
  document.querySelectorAll("[data-state]").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); cur = b.dataset.state; render();
});
document.querySelectorAll("[data-theme-btn]").forEach(b => b.onclick = () => {
  document.querySelectorAll("[data-theme-btn]").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); document.body.dataset.theme = b.dataset.themeBtn;
});
document.querySelectorAll(".fchip").forEach(b => b.onclick = () => {
  document.querySelectorAll(".fchip").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); filter = b.dataset.f; render();
});
document.getElementById("tools").onchange = render;
document.getElementById("fold").onclick = () => {
  const d = document.getElementById("details");
  d.classList.toggle("open");
  document.getElementById("fold").textContent = d.classList.contains("open") ? "⌃" : "⌄";
};
render();
</script>
</body>
</html>
